<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGuard | Audit Log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="displayUserInfo(); displayAuditLogs();">
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">AccessGuard</a>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-user">
          <span id="displayUsername">User</span> | <span id="displayRole">Role</span>
        </span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="dashboard-header mb-4">
      <p class="section-label">Audit Trail</p>
      <h1>Audit Log</h1>
      <p class="mb-0">This table records allowed and denied access attempts from the dashboard.</p>
    </section>

    <section class="table-card">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Log ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>Action</th>
              <th>Status</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="auditLogTableBody">
            <tr>
              <td colspan="6" class="text-center text-muted">No audit logs found</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
