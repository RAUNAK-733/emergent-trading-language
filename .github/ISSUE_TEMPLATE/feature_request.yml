name: Research or feature proposal
description: Propose a focused improvement with a clear evaluation plan.
title: "[Proposal]: "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: Motivation
      description: What research or engineering problem does this address?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed change
      description: Describe the smallest useful implementation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Evaluation
      description: How should the proposal be tested or compared?
    validations:
      required: true
