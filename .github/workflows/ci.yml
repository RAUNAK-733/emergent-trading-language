name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint Python sources
        run: python -m ruff check .

      - name: Compile Python sources
        run: python -m py_compile agents/agent.py env/trading_env.py env/baseline.py training/train.py training/curriculum.py analysis/verify.py analysis/topsim.py analysis/entropy.py analysis/plot_training.py analysis/probing.py analysis/umap_viz.py analysis/compare_runs.py utils/checkpoints.py utils/logger.py utils/status.py main.py

      - name: Run core environment tests
        run: python -m unittest discover -s tests -v
