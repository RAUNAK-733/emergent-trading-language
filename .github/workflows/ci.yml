name: CI

on:
  push:
  pull_request:

jobs:
  core-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install numpy torch scipy matplotlib seaborn

      - name: Compile Python sources
        run: python -m py_compile agents/agent.py env/trading_env.py env/baseline.py training/train.py analysis/verify.py analysis/topsim.py analysis/entropy.py analysis/plot_training.py utils/checkpoints.py utils/logger.py main.py

      - name: Run core environment tests
        run: python -m unittest discover -s tests -v
