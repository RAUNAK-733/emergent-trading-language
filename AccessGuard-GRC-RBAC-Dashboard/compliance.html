<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGuard | Compliance Checklist</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="displayUserInfo(); displayComplianceControls();">
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">AccessGuard</a>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-user">
          <span id="displayUsername">User</span> | <span id="displayRole">Role</span>
        </span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="dashboard-header mb-4">
      <p class="section-label">Compliance</p>
      <h1>Compliance Checklist</h1>
      <p class="mb-0">A basic checklist for tracking whether important security controls are present.</p>
    </section>

    <section class="table-card mb-4">
      <h2 class="form-title">Add Compliance Control</h2>

      <form onsubmit="addComplianceControl(event)">
        <div class="row g-3">
          <div class="col-md-5">
            <label for="controlName" class="form-label">Control Name</label>
            <input
              type="text"
              class="form-control"
              id="controlName"
              placeholder="Example: Password Policy"
            >
          </div>

          <div class="col-md-3">
            <label for="controlStatus" class="form-label">Status</label>
            <select class="form-select" id="controlStatus">
              <option value="">Select status</option>
              <option value="Completed">Completed</option>
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
            </select>
          </div>

          <div class="col-md-4">
            <label for="controlPurpose" class="form-label">Purpose</label>
            <input
              type="text"
              class="form-control"
              id="controlPurpose"
              placeholder="Example: Enforce strong passwords"
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary mt-3">Add Control</button>
      </form>
    </section>

    <section class="table-card">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Control ID</th>
              <th>Control Name</th>
              <th>Status</th>
              <th>Purpose</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="complianceTableBody">
            <tr>
              <td colspan="5" class="text-center text-muted">No compliance controls found</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
