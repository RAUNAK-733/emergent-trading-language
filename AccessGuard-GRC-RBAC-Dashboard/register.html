<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGuard | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
  <main class="login-wrapper">
    <section class="login-card">
      <div class="text-center mb-4">
        <h1 class="app-title">AccessGuard</h1>
        <p class="app-subtitle">Create a demo account</p>
      </div>

      <form onsubmit="registerUser(event)">
        <div class="mb-3">
          <label for="registerUsername" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="registerUsername"
            placeholder="Choose a username"
          >
        </div>

        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="registerPassword"
            placeholder="Create a password"
          >
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm Password</label>
          <input
            type="password"
            class="form-control"
            id="confirmPassword"
            placeholder="Re-enter password"
          >
        </div>

        <div class="mb-3">
          <label for="registerRole" class="form-label">Select Role</label>
          <select class="form-select" id="registerRole">
            <option value="">Choose a role</option>
            <option value="Admin">Admin</option>
            <option value="Teacher">Teacher</option>
            <option value="Student">Student</option>
            <option value="Accountant">Accountant</option>
            <option value="Guest">Guest</option>
          </select>
        </div>

        <p id="registerMessage" class="message-text"></p>

        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <a href="index.html">Back to login</a>
      </p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
