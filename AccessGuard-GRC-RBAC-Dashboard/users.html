<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AccessGuard Pro | User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body onload="displayUserInfo(); checkAdminAccessForUsersPage();">
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container">
      <a class="navbar-brand" href="dashboard.html">AccessGuard Pro</a>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-user">
          <span id="displayUsername">User</span> | <span id="displayRole">Role</span>
        </span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutUser()">Logout</button>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <section class="dashboard-header mb-4">
      <p class="section-label">Administration</p>
      <h1>User Management</h1>
      <p class="mb-0">Admin-only page for reviewing users, changing roles, and deleting accounts.</p>
    </section>

    <section id="usersAccessDenied" class="table-card d-none">
      <h2 class="form-title text-danger">Access Denied</h2>
      <p class="mb-0">Only Admin users can access the User Management page.</p>
    </section>

    <section id="usersTableSection" class="table-card d-none">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>User ID</th>
              <th>Username</th>
              <th>Role</th>
              <th>Change Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="5" class="text-center text-muted">No users found</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
